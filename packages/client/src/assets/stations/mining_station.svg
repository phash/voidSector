<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
<defs>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softglow">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="scanlines" x="0" y="0" width="512" height="2" patternUnits="userSpaceOnUse">
    <rect x="0" y="0" width="512" height="1" fill="rgba(0,0,0,0.18)"/>
    <rect x="0" y="1" width="512" height="1" fill="rgba(0,0,0,0)"/>
  </pattern>
  <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M32 0 L0 0 0 32" fill="none" stroke="rgba(255,176,0,0.08)" stroke-width="0.5"/>
  </pattern>
</defs>
<rect width="512" height="512" fill="#050505"/>
<rect width="512" height="512" fill="url(#grid)"/>

<!-- Asteroid (background, bottom-right) -->
<polygon points="420,272 398,268 378,278 362,296 355,318 358,342 372,360 390,370 412,370 432,358 446,340 448,318 440,298 432,282"
  stroke="#8B5A00" stroke-width="2" fill="rgba(100,60,0,0.08)"/>
<!-- Asteroid surface craters -->
<ellipse cx="400" cy="310" rx="8" ry="6" stroke="#8B5A00" stroke-width="1" fill="none" opacity="0.6"/>
<ellipse cx="425" cy="335" rx="5" ry="4" stroke="#8B5A00" stroke-width="1" fill="none" opacity="0.6"/>
<ellipse cx="380" cy="340" rx="6" ry="5" stroke="#8B5A00" stroke-width="1" fill="none" opacity="0.6"/>
<ellipse cx="415" cy="355" rx="4" ry="3" stroke="#8B5A00" stroke-width="1" fill="none" opacity="0.5"/>
<ellipse cx="370" cy="308" rx="5" ry="4" stroke="#8B5A00" stroke-width="1" fill="none" opacity="0.5"/>
<!-- Asteroid label -->
<text x="448" y="320" font-family="monospace" font-size="7" fill="#8B5A00">ASTEROID</text>
<text x="448" y="330" font-family="monospace" font-size="7" fill="#8B5A00">  M-7</text>

<!-- Main platform (cx=220, cy=240, pw=100, ph=35) -->
<rect x="120" y="205" width="200" height="70" stroke="#FFB000" stroke-width="3" fill="rgba(255,176,0,0.04)" filter="url(#softglow)"/>
<!-- Deck lines -->
<line x1="126" y1="228" x2="314" y2="228" stroke="#8B5A00" stroke-width="1"/>
<line x1="126" y1="240" x2="314" y2="240" stroke="#8B5A00" stroke-width="1"/>
<line x1="126" y1="252" x2="314" y2="252" stroke="#8B5A00" stroke-width="1"/>

<!-- Ore processor tower (cx=220, above platform) -->
<rect x="200" y="140" width="40" height="65" stroke="#FFB000" stroke-width="2" fill="rgba(255,176,0,0.04)"/>
<!-- Conveyor bands inside tower -->
<line x1="204" y1="152" x2="236" y2="152" stroke="#8B5A00" stroke-width="0.8" opacity="0.5"/>
<line x1="204" y1="163" x2="236" y2="163" stroke="#8B5A00" stroke-width="0.8" opacity="0.5"/>
<line x1="204" y1="174" x2="236" y2="174" stroke="#8B5A00" stroke-width="0.8" opacity="0.5"/>
<line x1="204" y1="185" x2="236" y2="185" stroke="#8B5A00" stroke-width="0.8" opacity="0.5"/>
<line x1="204" y1="196" x2="236" y2="196" stroke="#8B5A00" stroke-width="0.8" opacity="0.5"/>
<!-- Chimney stacks -->
<rect x="207" y="62" width="10" height="20" stroke="#8B5A00" stroke-width="1" fill="none"/>
<ellipse cx="212" cy="58" rx="7" ry="5" stroke="#8B5A00" stroke-width="1" fill="none" opacity="0.6"/>
<rect x="222" y="62" width="10" height="20" stroke="#8B5A00" stroke-width="1" fill="none"/>
<ellipse cx="227" cy="58" rx="7" ry="5" stroke="#8B5A00" stroke-width="1" fill="none" opacity="0.6"/>

<!-- Extraction arms (4 arms extending left from platform) -->
<!-- Arm 1: angle -145° from (120,240) -->
<line x1="120" y1="240" x2="38" y2="192" stroke="#FFB000" stroke-width="2" filter="url(#softglow)"/>
<!-- Drill head -->
<polygon points="38,184 30,200 46,200" stroke="#FFD540" stroke-width="1.5" fill="rgba(255,213,64,0.12)"/>

<!-- Arm 2: angle -108° from (120,240) -->
<line x1="120" y1="240" x2="46" y2="165" stroke="#FFB000" stroke-width="2" filter="url(#softglow)"/>
<polygon points="38,160 50,175 60,160" stroke="#FFD540" stroke-width="1.5" fill="rgba(255,213,64,0.12)"/>

<!-- Arm 3: angle -72° from (120,240) -->
<line x1="120" y1="240" x2="148" y2="162" stroke="#FFB000" stroke-width="2" filter="url(#softglow)"/>
<polygon points="140,154 154,154 148,170" stroke="#FFD540" stroke-width="1.5" fill="rgba(255,213,64,0.12)"/>

<!-- Arm 4: angle -35° from (120,240) -->
<line x1="120" y1="240" x2="190" y2="173" stroke="#FFB000" stroke-width="2" filter="url(#softglow)"/>
<polygon points="182,166 196,166 192,182" stroke="#FFD540" stroke-width="1.5" fill="rgba(255,213,64,0.12)"/>

<!-- Storage silos (right side, 3 silos) -->
<!-- Silo 1 -->
<ellipse cx="362" cy="200" rx="16" ry="20" stroke="#FFB000" stroke-width="2" fill="rgba(255,176,0,0.04)"/>
<rect x="350" y="205" width="24" height="12" fill="rgba(255,176,0,0.12)" opacity="0.7"/>
<text x="362" y="192" font-family="monospace" font-size="7" fill="#8B5A00" text-anchor="middle">S1</text>
<line x1="320" y1="220" x2="346" y2="205" stroke="#8B5A00" stroke-width="1"/>

<!-- Silo 2 -->
<ellipse cx="362" cy="240" rx="16" ry="20" stroke="#FFB000" stroke-width="2" fill="rgba(255,176,0,0.04)"/>
<rect x="350" y="240" width="24" height="16" fill="rgba(255,176,0,0.12)" opacity="0.7"/>
<text x="362" y="232" font-family="monospace" font-size="7" fill="#8B5A00" text-anchor="middle">S2</text>
<line x1="320" y1="240" x2="346" y2="240" stroke="#8B5A00" stroke-width="1"/>

<!-- Silo 3 -->
<ellipse cx="362" cy="280" rx="16" ry="20" stroke="#FFB000" stroke-width="2" fill="rgba(255,176,0,0.04)"/>
<rect x="350" y="270" width="24" height="26" fill="rgba(255,176,0,0.15)" opacity="0.7"/>
<text x="362" y="272" font-family="monospace" font-size="7" fill="#8B5A00" text-anchor="middle">S3</text>
<line x1="320" y1="260" x2="346" y2="275" stroke="#8B5A00" stroke-width="1"/>

<!-- Tether cables to asteroid -->
<line x1="320" y1="260" x2="360" y2="288" stroke="#8B5A00" stroke-width="1.5" stroke-dasharray="4,4"/>
<line x1="320" y1="230" x2="358" y2="272" stroke="#8B5A00" stroke-width="1" stroke-dasharray="4,4"/>

<!-- Annotations -->
<g stroke="#8B5A00" stroke-width="1" fill="none">
  <circle cx="220" cy="165" r="2.5" fill="#8B5A00"/>
  <line x1="220" y1="165" x2="135" y2="133"/>
</g>
<text x="133" y="131" font-family="monospace" font-size="8" fill="#8B5A00" text-anchor="end">ORE PROCESSOR</text>

<g stroke="#8B5A00" stroke-width="1" fill="none">
  <circle cx="78" cy="178" r="2.5" fill="#8B5A00"/>
  <line x1="78" y1="178" x2="18" y2="145"/>
</g>
<text x="16" y="143" font-family="monospace" font-size="8" fill="#8B5A00" text-anchor="end">DRILL ARM</text>

<g stroke="#8B5A00" stroke-width="1" fill="none">
  <circle cx="362" cy="200" r="2.5" fill="#8B5A00"/>
  <line x1="362" y1="200" x2="412" y2="168"/>
</g>
<text x="416" y="166" font-family="monospace" font-size="8" fill="#8B5A00">STORAGE SILO</text>

<g stroke="#8B5A00" stroke-width="1" fill="none">
  <circle cx="403" cy="290" r="2.5" fill="#8B5A00"/>
  <line x1="403" y1="290" x2="452" y2="265"/>
</g>
<text x="456" y="263" font-family="monospace" font-size="8" fill="#8B5A00">ASTEROID M-7</text>

<!-- Header/Footer -->
<text x="10" y="16" font-family="monospace" font-size="9" fill="#8B5A00">[VOID SECTOR] — SCHEMATIC DISPLAY</text>
<text x="502" y="16" font-family="monospace" font-size="9" fill="#8B5A00" text-anchor="end">SCANNER DISPLAY v2.4</text>
<text x="10" y="506" font-family="monospace" font-size="9" fill="#FFB000">MINING STATION  //  CLASS: INDUSTRIAL  //  OUTPUT: 840 T/DAY</text>
<text x="502" y="506" font-family="monospace" font-size="9" fill="#8B5A00" text-anchor="end">CLASSIFICATION: OPEN</text>

<!-- Corner brackets -->
<g stroke="#FFB000" stroke-width="2" fill="none">
  <polyline points="12,34 12,12 34,12"/>
  <polyline points="478,12 500,12 500,34"/>
  <polyline points="12,478 12,500 34,500"/>
  <polyline points="478,500 500,500 500,478"/>
</g>

<rect width="512" height="512" fill="url(#scanlines)" opacity="0.5"/>
</svg>
