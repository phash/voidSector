<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
<defs>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softglow">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="scanlines" x="0" y="0" width="512" height="2" patternUnits="userSpaceOnUse">
    <rect x="0" y="0" width="512" height="1" fill="rgba(0,0,0,0.18)"/>
    <rect x="0" y="1" width="512" height="1" fill="rgba(0,0,0,0)"/>
  </pattern>
  <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M32 0 L0 0 0 32" fill="none" stroke="rgba(255,176,0,0.08)" stroke-width="0.5"/>
  </pattern>
</defs>
<rect width="512" height="512" fill="#050505"/>
<rect width="512" height="512" fill="url(#grid)"/>

<!-- Main hull (asymmetric salvaged freighter shape) -->
<polygon points="188,214 326,204 340,234 324,328 270,342 220,337 171,302 166,244"
  stroke="#FFB000" stroke-width="2" fill="rgba(255,176,0,0.04)" filter="url(#softglow)"/>

<!-- Hull damage / weld marks -->
<g stroke="#8B5A00" stroke-width="1" opacity="0.7">
  <line x1="213" y1="236" x2="225" y2="244"/>
  <line x1="216" y1="232" x2="210" y2="243"/>
  <line x1="238" y1="261" x2="250" y2="269"/>
  <line x1="241" y1="257" x2="235" y2="268"/>
  <line x1="268" y1="226" x2="280" y2="234"/>
  <line x1="271" y1="222" x2="265" y2="233"/>
  <line x1="293" y1="281" x2="305" y2="289"/>
  <line x1="296" y1="277" x2="290" y2="288"/>
  <line x1="198" y1="301" x2="210" y2="309"/>
  <line x1="201" y1="297" x2="195" y2="308"/>
</g>

<!-- Internal compartment dividers -->
<g stroke="#8B5A00" stroke-width="1" opacity="0.5">
  <line x1="220" y1="210" x2="220" y2="337"/>
  <line x1="276" y1="206" x2="272" y2="338"/>
  <line x1="168" y1="274" x2="336" y2="268"/>
</g>

<!-- Left engine cluster (3 pods) -->
<!-- Engine glow halos -->
<ellipse cx="151" cy="234" rx="15" ry="10" fill="rgba(255,100,0,0.20)" filter="url(#glow2)"/>
<ellipse cx="146" cy="270" rx="15" ry="10" fill="rgba(255,100,0,0.20)" filter="url(#glow2)"/>
<ellipse cx="158" cy="302" rx="15" ry="10" fill="rgba(255,100,0,0.20)" filter="url(#glow2)"/>
<!-- Engine housings -->
<ellipse cx="151" cy="234" rx="14" ry="9" stroke="#FFB000" stroke-width="2" fill="none"/>
<line x1="171" y1="244" x2="165" y2="234" stroke="#8B5A00" stroke-width="1"/>
<ellipse cx="146" cy="270" rx="14" ry="9" stroke="#FFB000" stroke-width="2" fill="none"/>
<line x1="171" y1="270" x2="160" y2="270" stroke="#8B5A00" stroke-width="1"/>
<ellipse cx="158" cy="302" rx="14" ry="9" stroke="#FFB000" stroke-width="2" fill="none"/>
<line x1="171" y1="294" x2="172" y2="302" stroke="#8B5A00" stroke-width="1"/>

<!-- Right engine (large salvaged pod) -->
<ellipse cx="338" cy="216" rx="18" ry="12" stroke="#FFB000" stroke-width="2" fill="rgba(255,100,0,0.12)" filter="url(#softglow)"/>
<line x1="328" y1="204" x2="334" y2="194" stroke="#8B5A00" stroke-width="1"/>

<!-- Hidden weapon platform top (concealed behind panel) -->
<rect x="238" y="187" width="40" height="18" stroke="#8B5A00" stroke-width="1.5" fill="rgba(255,176,0,0.06)"/>
<!-- Twin gun barrels (pointing up) -->
<line x1="248" y1="187" x2="244" y2="164" stroke="#FFD540" stroke-width="2.5" filter="url(#softglow)"/>
<line x1="268" y1="187" x2="264" y2="164" stroke="#FFD540" stroke-width="2.5" filter="url(#softglow)"/>
<!-- Concealment hatch line -->
<line x1="238" y1="196" x2="278" y2="196" stroke="#8B5A00" stroke-width="1" stroke-dasharray="3,3"/>
<text x="258" y="212" font-family="monospace" font-size="7" fill="#8B5A00" text-anchor="middle">! CONCEALED</text>

<!-- Bottom rail cannon -->
<line x1="213" y1="358" x2="283" y2="358" stroke="#FFD540" stroke-width="3" filter="url(#glow)"/>
<rect x="234" y="351" width="28" height="14" stroke="#8B5A00" stroke-width="1" fill="rgba(255,176,0,0.06)"/>

<!-- Missile pods (left side, outside hull) -->
<g stroke="#FFB000" stroke-width="1" fill="rgba(255,176,0,0.08)">
  <rect x="144" y="238" width="12" height="8"/>
  <rect x="144" y="249" width="12" height="8"/>
  <rect x="144" y="260" width="12" height="8"/>
</g>

<!-- Missile pods (right side) -->
<g stroke="#FFB000" stroke-width="1" fill="rgba(255,176,0,0.08)">
  <rect x="348" y="258" width="12" height="8"/>
  <rect x="348" y="269" width="12" height="8"/>
  <rect x="348" y="280" width="12" height="8"/>
</g>

<!-- Makeshift comms tower (top right of hull) -->
<line x1="300" y1="208" x2="318" y2="160" stroke="#FFB000" stroke-width="1.5" filter="url(#softglow)"/>
<g stroke="#8B5A00" stroke-width="1">
  <line x1="304" y1="162" x2="318" y2="162"/>
  <line x1="318" y1="162" x2="332" y2="162"/>
  <line x1="312" y1="162" x2="318" y2="162"/>
</g>
<circle cx="318" cy="156" r="4" stroke="#8B5A00" stroke-width="1" fill="none"/>
<!-- Makeshift support struts -->
<line x1="310" y1="185" x2="318" y2="162" stroke="#8B5A00" stroke-width="0.8" opacity="0.6"/>

<!-- Docking clamps (bottom) -->
<g stroke="#FFB000" stroke-width="2.5">
  <line x1="231" y1="337" x2="231" y2="357"/>
  <line x1="219" y1="357" x2="243" y2="357"/>
  <line x1="261" y1="337" x2="261" y2="357"/>
  <line x1="249" y1="357" x2="273" y2="357"/>
</g>

<!-- Scan glitch artefacts -->
<line x1="42" y1="185" x2="97" y2="185" stroke="#FFD540" stroke-width="1" opacity="0.22"/>
<line x1="310" y1="380" x2="348" y2="380" stroke="#FFD540" stroke-width="1" opacity="0.22"/>
<line x1="160" y1="95" x2="205" y2="95" stroke="#FFD540" stroke-width="1" opacity="0.22"/>

<!-- Annotations -->
<g stroke="#8B5A00" stroke-width="1" fill="none">
  <circle cx="148" cy="234" r="2.5" fill="#8B5A00"/>
  <line x1="148" y1="234" x2="88" y2="204"/>
</g>
<text x="86" y="202" font-family="monospace" font-size="8" fill="#8B5A00" text-anchor="end">ENGINE CLUSTER</text>

<g stroke="#8B5A00" stroke-width="1" fill="none">
  <circle cx="258" cy="164" r="2.5" fill="#8B5A00"/>
  <line x1="258" y1="164" x2="323" y2="132"/>
</g>
<text x="327" y="130" font-family="monospace" font-size="8" fill="#8B5A00">!! WEAPON ARRAY</text>

<g stroke="#8B5A00" stroke-width="1" fill="none">
  <circle cx="338" cy="216" r="2.5" fill="#8B5A00"/>
  <line x1="338" y1="216" x2="393" y2="188"/>
</g>
<text x="397" y="186" font-family="monospace" font-size="8" fill="#8B5A00">SALVAGED POD</text>

<g stroke="#8B5A00" stroke-width="1" fill="none">
  <circle cx="318" cy="156" r="2.5" fill="#8B5A00"/>
  <line x1="318" y1="156" x2="368" y2="134"/>
</g>
<text x="372" y="132" font-family="monospace" font-size="8" fill="#8B5A00">COMMS TOWER</text>

<g stroke="#8B5A00" stroke-width="1" fill="none">
  <circle cx="283" cy="358" r="2.5" fill="#8B5A00"/>
  <line x1="283" y1="358" x2="333" y2="378"/>
</g>
<text x="337" y="376" font-family="monospace" font-size="8" fill="#8B5A00">RAIL CANNON</text>

<!-- Header/Footer -->
<text x="10" y="16" font-family="monospace" font-size="9" fill="#8B5A00">[VOID SECTOR] — SCHEMATIC DISPLAY</text>
<text x="502" y="16" font-family="monospace" font-size="9" fill="#8B5A00" text-anchor="end">SCANNER DISPLAY v2.4</text>
<text x="10" y="506" font-family="monospace" font-size="9" fill="#FFB000">PIRATE HIDEOUT  //  CLASS: UNKNOWN  //  WARNING: HOSTILE</text>
<text x="502" y="506" font-family="monospace" font-size="9" fill="#8B5A00" text-anchor="end">CLASSIFICATION: OPEN</text>

<!-- Corner brackets -->
<g stroke="#FFB000" stroke-width="2" fill="none">
  <polyline points="12,34 12,12 34,12"/>
  <polyline points="478,12 500,12 500,34"/>
  <polyline points="12,478 12,500 34,500"/>
  <polyline points="478,500 500,500 500,478"/>
</g>

<rect width="512" height="512" fill="url(#scanlines)" opacity="0.5"/>
</svg>
