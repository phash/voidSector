  <g stroke="#B46E00" stroke-width="0.7" stroke-dasharray="3,3" fill="none">
    <line x1="256" y1="100" x2="308" y2="75"/>
    <circle fill="#B46E00" stroke="none" cx="256" cy="100" r="1.5"/>
    <line x1="434" y1="256" x2="456" y2="288"/>
    <circle fill="#B46E00" stroke="none" cx="434" cy="256" r="1.5"/>
    <line x1="256" y1="256" x2="316" y2="306"/>
    <circle fill="#B46E00" stroke="none" cx="256" cy="256" r="1.5"/>
