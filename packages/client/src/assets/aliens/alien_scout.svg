<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines" width="1" height="2" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="rgba(0,0,0,0.18)"/>
    </pattern>
    <style>
      .amber { stroke: #FFB000; fill: none; }
      .dim   { stroke: #B46E00; fill: none; }
      .faint { stroke: #503200; fill: none; }
      .bright{ stroke: #FFD250; fill: none; }
      .node  { fill: #FFD250; }
      .node-a{ fill: #FFB000; }
      .txt   { fill: #B46E00; font-family: monospace; font-size: 8px; }
      .txt-f { fill: #503200; font-family: monospace; font-size: 7px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#050505"/>

  <!-- Grid -->
  <g class="faint" stroke-width="0.5" opacity="0.7">
    <line x1="32"  y1="0" x2="32"  y2="512"/>
    <line x1="64"  y1="0" x2="64"  y2="512"/>
    <line x1="96"  y1="0" x2="96"  y2="512"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="160" y1="0" x2="160" y2="512"/>
    <line x1="192" y1="0" x2="192" y2="512"/>
    <line x1="224" y1="0" x2="224" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="288" y1="0" x2="288" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="352" y1="0" x2="352" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="416" y1="0" x2="416" y2="512"/>
    <line x1="448" y1="0" x2="448" y2="512"/>
    <line x1="480" y1="0" x2="480" y2="512"/>
    <line x1="0" y1="32"  x2="512" y2="32"/>
    <line x1="0" y1="64"  x2="512" y2="64"/>
    <line x1="0" y1="96"  x2="512" y2="96"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="160" x2="512" y2="160"/>
    <line x1="0" y1="192" x2="512" y2="192"/>
    <line x1="0" y1="224" x2="512" y2="224"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="288" x2="512" y2="288"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="352" x2="512" y2="352"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="0" y1="416" x2="512" y2="416"/>
    <line x1="0" y1="448" x2="512" y2="448"/>
    <line x1="0" y1="480" x2="512" y2="480"/>
  </g>

  <!-- Corner marks -->
  <g class="dim" stroke-width="1">
    <line x1="4" y1="4" x2="20" y2="4"/><line x1="4" y1="4" x2="4" y2="20"/>
    <line x1="508" y1="4" x2="492" y2="4"/><line x1="508" y1="4" x2="508" y2="20"/>
    <line x1="4" y1="508" x2="20" y2="508"/><line x1="4" y1="508" x2="4" y2="492"/>
    <line x1="508" y1="508" x2="492" y2="508"/><line x1="508" y1="508" x2="508" y2="492"/>
  </g>

  <!-- cx=256 cy=266 -->

  <!-- HULL: outer organic ellipse (asymmetric, wavy) -->
  <g filter="url(#glow)">
    <path class="amber" stroke-width="2"
      d="M348,266 C348,235 320,222 280,220 C240,218 180,225 170,242
         C158,260 164,284 192,294 C220,304 260,302 300,295 C335,288 348,297 348,266 Z"/>
    <path class="dim" stroke-width="1"
      d="M335,266 C335,240 310,229 274,228 C238,227 185,233 176,248
         C166,264 172,283 196,291 C220,299 255,297 290,290 C322,283 335,291 335,266 Z"/>
    <path class="faint" stroke-width="1"
      d="M318,266 C318,244 298,234 266,234 C234,234 188,240 180,254
         C171,268 177,283 198,289 C219,295 250,293 280,287 C308,281 318,288 318,266 Z"/>
  </g>

  <!-- LEFT WING (larger, swept) -->
  <polygon class="amber" stroke-width="1.5"
    points="231,258 138,214 108,250 144,298 208,284"/>
  <line class="dim" stroke-width="0.8" x1="201" y1="266" x2="138" y2="234"/>
  <line class="dim" stroke-width="0.8" x1="184" y1="276" x2="121" y2="268"/>
  <line class="dim" stroke-width="0.8" x1="166" y1="238" x2="116" y2="236"/>

  <!-- RIGHT WING (stub) -->
  <polygon class="amber" stroke-width="1"
    points="284,259 361,228 374,254 328,286 300,280"/>
  <line class="dim" stroke-width="0.7" x1="308" y1="264" x2="358" y2="242"/>

  <!-- TENTACLES (bottom — quadratic bezier curves) -->
  <g class="amber" stroke-width="1" fill="none">
    <path d="M201,294 Q156,334 171,371"/>
    <path d="M238,304 Q228,348 248,384"/>
    <path d="M278,302 Q294,346 311,378"/>
    <path d="M311,286 Q338,331 328,364"/>
  </g>
  <!-- Tentacle tips -->
  <circle class="node" cx="171" cy="371" r="2.5"/>
  <circle class="node" cx="248" cy="384" r="2.5"/>
  <circle class="node" cx="311" cy="378" r="2.5"/>
  <circle class="node" cx="328" cy="364" r="2.5"/>

  <!-- UPPER TENDRILS -->
  <g class="dim" stroke-width="1" fill="none">
    <path d="M218,234 Q191,194 204,164"/>
    <path d="M268,226 Q278,188 291,158"/>
  </g>
  <circle fill="#B46E00" cx="204" cy="164" r="2"/>
  <circle fill="#B46E00" cx="291" cy="158" r="2"/>

  <!-- ENERGY NODES -->
  <g filter="url(#glow-strong)">
    <!-- Central core -->
    <circle class="node" cx="256" cy="266" r="7"/>
    <circle class="amber" stroke-width="1" cx="256" cy="266" r="14"/>
    <line class="dim" stroke-width="0.7" x1="235" y1="266" x2="277" y2="266"/>
    <line class="dim" stroke-width="0.7" x1="256" y1="245" x2="256" y2="287"/>
    <!-- Left wing node -->
    <circle class="node-a" cx="141" cy="228" r="4"/>
    <circle class="amber" stroke-width="1" cx="141" cy="228" r="8"/>
    <!-- Right wing node -->
    <circle fill="#B46E00" cx="356" cy="240" r="3"/>
    <circle class="dim" stroke-width="1" cx="356" cy="240" r="6"/>
  </g>

  <!-- FORWARD SENSOR ARRAY -->
  <g class="amber" stroke-width="1">
    <circle cx="336" cy="260" r="3"/>
    <line class="dim" x1="339" y1="260" x2="348" y2="260"/>
    <circle cx="348" cy="264" r="3"/>
    <line class="dim" x1="351" y1="264" x2="360" y2="264"/>
    <circle cx="360" cy="268" r="3"/>
    <line class="dim" x1="363" y1="268" x2="372" y2="268"/>
    <circle cx="372" cy="272" r="2.5"/>
    <line class="dim" x1="374" y1="272" x2="381" y2="272"/>
  </g>

  <!-- SCAN SWEEP ARC -->
  <path class="faint" stroke-width="1" fill="none"
    d="M385,232 A32,32 0 0 1 385,300"/>
  <path class="faint" stroke-width="0.5" fill="none" opacity="0.5"
    d="M395,224 A42,42 0 0 1 395,308"/>

  <!-- DORSAL SPINE -->
  <line class="dim" stroke-width="1" x1="168" y1="270" x2="346" y2="264"/>

  <!-- SCAN BARS -->
  <line class="faint" stroke-width="1" stroke-dasharray="4,4" x1="0" y1="118" x2="512" y2="118"/>
  <line class="faint" stroke-width="1" stroke-dasharray="4,4" x1="0" y1="398" x2="512" y2="398"/>

  <!-- ANNOTATION LINES -->
  <g class="dim" stroke-width="0.7" stroke-dasharray="3,3">
    <line x1="356" y1="224" x2="396" y2="178"/>
    <circle fill="#B46E00" cx="356" cy="224" r="1.5"/>
    <line x1="108" y1="250" x2="68" y2="210"/>
    <circle fill="#B46E00" cx="108" cy="250" r="1.5"/>
    <line x1="256" y1="259" x2="216" y2="101"/>
    <circle fill="#B46E00" cx="256" cy="259" r="1.5"/>
  </g>

  <!-- ANNOTATION TEXT -->
  <text class="txt-f" x="398" y="176">SENSOR ARRAY</text>
  <text class="txt-f" x="32"  y="208">WING-L</text>
  <text class="txt-f" x="196" y="99" >CORE</text>

  <!-- HUD TEXT -->
  <text class="txt" x="8" y="22">VOID SECTOR // SCAN TERMINAL v4.7</text>
  <text class="txt" x="8" y="33">CONTACT: UNKNOWN VESSEL CLASS-A</text>
  <text class="txt" x="8" y="44">DESIGNATION: ALIEN SCOUT [BIO-MECH]</text>
  <text class="txt" x="8" y="55">STATUS: ACTIVE  THREAT: MODERATE</text>

  <text class="txt-f" x="440" y="22">SIG: 0.34 AU</text>
  <text class="txt-f" x="440" y="33">MASS: ~12 MT</text>
  <text class="txt-f" x="440" y="44">CLASS: SCOUT</text>
  <text class="txt-f" x="440" y="55">ID: UNK-001</text>

  <text class="txt-f" x="8" y="498">SCAN COMPLETE</text>
  <text class="txt-f" x="8" y="507">RES: 512x512</text>

  <!-- CRT Scanlines overlay -->
  <rect width="512" height="512" fill="url(#scanlines)" opacity="0.4"/>
</svg>
