<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="glow_soft_gas" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow_strong_gas" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="coloredBlur"/><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines_gas" x="0" y="0" width="512" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="512" height="2" fill="rgba(0,0,0,0.25)"/>
      <rect x="0" y="2" width="512" height="2" fill="rgba(0,0,0,0.05)"/>
    </pattern>
    <radialGradient id="vignette_gas" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.7)"/>
    </radialGradient>
    <radialGradient id="amberGrad_gas" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFB000" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFB000" stop-opacity="0.02"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#050505"/>
  <rect width="512" height="512" fill="url(#amberGrad_gas)"/>

  <!-- Corner brackets -->
  <g fill="none" stroke="#CC8800" stroke-width="1" opacity="0.6">
    <polyline points="16,36 16,16 36,16"/>
    <polyline points="476,16 496,16 496,36"/>
    <polyline points="16,476 16,496 36,496"/>
    <polyline points="476,496 496,496 496,476"/>
  </g>

  <!-- Main content -->
  <g filter="url(#glow_soft_gas)">
    <!-- Canister body -->
    <rect x="175" y="120" width="162" height="240" rx="18" ry="18" fill="none" stroke="#FFB000" stroke-width="2.5"/>
    <!-- Canister top cap -->
    <ellipse cx="256" cy="120" rx="81" ry="18" fill="none" stroke="#FFB000" stroke-width="2"/>
    <!-- Canister bottom cap -->
    <ellipse cx="256" cy="360" rx="81" ry="18" fill="none" stroke="#FFB000" stroke-width="2"/>

    <!-- Valve / nozzle top -->
    <rect x="230" y="90" width="52" height="32" rx="6" fill="none" stroke="#FFB000" stroke-width="2"/>
    <rect x="242" y="72" width="28" height="20" rx="4" fill="none" stroke="#FFB000" stroke-width="2"/>
    <line x1="256" y1="72" x2="256" y2="60" stroke="#FFB000" stroke-width="2"/>
    <circle cx="256" cy="57" r="5" fill="none" stroke="#FFB000" stroke-width="2"/>

    <!-- Pressure gauge -->
    <circle cx="256" cy="165" r="28" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <circle cx="256" cy="165" r="22" fill="none" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
    <!-- Gauge ticks -->
    <line x1="256" y1="139" x2="256" y2="145" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="284" y1="165" x2="278" y2="165" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="228" y1="165" x2="234" y2="165" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="256" y1="191" x2="256" y2="185" stroke="#FFB000" stroke-width="1.5"/>
    <!-- Gauge needle -->
    <line x1="256" y1="165" x2="272" y2="152" stroke="#FFD050" stroke-width="2"/>
    <circle cx="256" cy="165" r="3" fill="#FFB000"/>

    <!-- Swirling gas inside canister -->
    <path d="M210,240 Q230,210 256,230 Q282,250 300,220 Q318,190 295,240 Q272,290 248,260 Q224,230 210,240"
      fill="none" stroke="#CC8800" stroke-width="1" opacity="0.6"/>
    <path d="M225,255 Q245,235 260,250 Q275,265 265,245 Q255,225 238,240 Q221,255 225,255"
      fill="none" stroke="#CC8800" stroke-width="1" opacity="0.5"/>

    <!-- Gas particles -->
    <circle cx="220" cy="270" r="2" fill="#FFB000" opacity="0.4"/>
    <circle cx="240" cy="250" r="1.5" fill="#FFB000" opacity="0.5"/>
    <circle cx="270" cy="260" r="2" fill="#FFB000" opacity="0.4"/>
    <circle cx="290" cy="285" r="1.5" fill="#FFB000" opacity="0.4"/>
    <circle cx="248" cy="300" r="2" fill="#FFB000" opacity="0.3"/>
    <circle cx="228" cy="310" r="1.5" fill="#FFB000" opacity="0.3"/>
    <circle cx="285" cy="310" r="1.5" fill="#FFB000" opacity="0.3"/>
    <circle cx="258" cy="278" r="1.5" fill="#FFB000" opacity="0.35"/>
    <circle cx="235" cy="325" r="1.5" fill="#FFB000" opacity="0.25"/>
    <circle cx="275" cy="330" r="1.5" fill="#FFB000" opacity="0.25"/>

    <!-- Fill level indicator on side -->
    <line x1="176" y1="200" x2="176" y2="355" stroke="#CC8800" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
    <rect x="168" y="250" width="8" height="105" rx="2" fill="#FFB000" opacity="0.2"/>
    <line x1="164" y1="250" x2="188" y2="250" stroke="#FFB000" stroke-width="1.5" opacity="0.7"/>
    <line x1="164" y1="355" x2="188" y2="355" stroke="#CC8800" stroke-width="1" opacity="0.5"/>

    <!-- Warning stripe dashed -->
    <line x1="175" y1="335" x2="337" y2="335" stroke="#CC8800" stroke-width="1" opacity="0.4" stroke-dasharray="8,4"/>

    <!-- Canister ribs/bands -->
    <line x1="177" y1="220" x2="337" y2="220" stroke="#CC8800" stroke-width="1" opacity="0.35"/>
    <line x1="177" y1="290" x2="337" y2="290" stroke="#CC8800" stroke-width="1" opacity="0.35"/>

    <!-- Output connectors right side -->
    <rect x="337" y="150" width="14" height="8" rx="2" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <rect x="337" y="165" width="14" height="8" rx="2" fill="none" stroke="#FFB000" stroke-width="1.5"/>
  </g>

  <!-- Glow outline -->
  <rect x="175" y="120" width="162" height="240" rx="18" ry="18"
    fill="none" stroke="#FFD050" stroke-width="0.8" opacity="0.35" filter="url(#glow_strong_gas)"/>

  <!-- Annotations -->
  <text x="256" y="30" fill="#CC8800" font-family="monospace" font-size="12" opacity="0.7" text-anchor="middle">[ FLUID SYSTEMS :: GAS CANISTER ]</text>
  <text x="256" y="45" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7" text-anchor="middle">PRESSURIZED CONTAINMENT UNIT</text>
  <text x="370" y="160" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7">PSI</text>
  <text x="370" y="173" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7">847</text>
  <text x="370" y="255" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7">FILL</text>
  <text x="370" y="268" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7">68%</text>
  <text x="370" y="300" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7">TEMP</text>
  <text x="370" y="313" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7">-42 C</text>
  <text x="140" y="290" fill="#CC8800" font-family="monospace" font-size="9" opacity="0.6" text-anchor="middle">68%</text>
  <text x="256" y="490" fill="#CC8800" font-family="monospace" font-size="9" opacity="0.7" text-anchor="middle">SYS:CARGO  REF:GAS-CAN  COMPOUND:XEN-7</text>

  <!-- Scan lines overlay -->
  <rect width="512" height="512" fill="url(#scanlines_gas)" opacity="0.4"/>
  <!-- Vignette -->
  <rect width="512" height="512" fill="url(#vignette_gas)"/>
</svg>
