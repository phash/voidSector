<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="glow_soft_cb" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow_strong_cb" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="coloredBlur"/><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines_cb" x="0" y="0" width="512" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="512" height="2" fill="rgba(0,0,0,0.25)"/>
      <rect x="0" y="2" width="512" height="2" fill="rgba(0,0,0,0.05)"/>
    </pattern>
    <radialGradient id="vignette_cb" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.7)"/>
    </radialGradient>
    <radialGradient id="amberGrad_cb" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFB000" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFB000" stop-opacity="0.02"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#050505"/>
  <rect width="512" height="512" fill="url(#amberGrad_cb)"/>

  <!-- Corner brackets -->
  <g fill="none" stroke="#CC8800" stroke-width="1" opacity="0.6">
    <polyline points="16,36 16,16 36,16"/>
    <polyline points="476,16 496,16 496,36"/>
    <polyline points="16,476 16,496 36,496"/>
    <polyline points="476,496 496,496 496,476"/>
  </g>

  <!-- Main content -->
  <g filter="url(#glow_soft_cb)">
    <!-- PCB outline -->
    <rect x="110" y="108" width="292" height="260" rx="6" fill="none" stroke="#FFB000" stroke-width="2.5"/>

    <!-- Mounting holes -->
    <circle cx="126" cy="124" r="8" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <circle cx="386" cy="124" r="8" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <circle cx="126" cy="352" r="8" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <circle cx="386" cy="352" r="8" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <!-- Hole centers -->
    <circle cx="126" cy="124" r="2" fill="#CC8800" opacity="0.5"/>
    <circle cx="386" cy="124" r="2" fill="#CC8800" opacity="0.5"/>
    <circle cx="126" cy="352" r="2" fill="#CC8800" opacity="0.5"/>
    <circle cx="386" cy="352" r="2" fill="#CC8800" opacity="0.5"/>

    <!-- Main CPU chip -->
    <rect x="208" y="162" width="100" height="100" rx="3" fill="none" stroke="#FFB000" stroke-width="2"/>
    <rect x="216" y="170" width="84" height="84" rx="2" fill="none" stroke="#CC8800" stroke-width="1" opacity="0.6"/>
    <!-- CPU core pattern -->
    <rect x="228" y="182" width="60" height="60" rx="2" fill="none" stroke="#CC8800" stroke-width="0.8" opacity="0.4"/>
    <line x1="228" y1="212" x2="288" y2="212" stroke="#CC8800" stroke-width="0.8" opacity="0.4"/>
    <line x1="258" y1="182" x2="258" y2="242" stroke="#CC8800" stroke-width="0.8" opacity="0.4"/>
    <!-- CPU text -->
    <text x="258" y="219" fill="#CC8800" font-family="monospace" font-size="10" text-anchor="middle" opacity="0.8">VS-CPU</text>
    <text x="258" y="231" fill="#CC8800" font-family="monospace" font-size="8" text-anchor="middle" opacity="0.5">4.2 GHz</text>

    <!-- CPU pins left -->
    <line x1="208" y1="176" x2="196" y2="176" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="208" y1="188" x2="196" y2="188" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="208" y1="200" x2="196" y2="200" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="208" y1="212" x2="196" y2="212" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="208" y1="224" x2="196" y2="224" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="208" y1="236" x2="196" y2="236" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="208" y1="248" x2="196" y2="248" stroke="#FFB000" stroke-width="1.5"/>
    <!-- CPU pins right -->
    <line x1="308" y1="176" x2="320" y2="176" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="308" y1="188" x2="320" y2="188" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="308" y1="200" x2="320" y2="200" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="308" y1="212" x2="320" y2="212" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="308" y1="224" x2="320" y2="224" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="308" y1="236" x2="320" y2="236" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="308" y1="248" x2="320" y2="248" stroke="#FFB000" stroke-width="1.5"/>
    <!-- CPU pins top -->
    <line x1="222" y1="162" x2="222" y2="150" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="236" y1="162" x2="236" y2="150" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="250" y1="162" x2="250" y2="150" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="264" y1="162" x2="264" y2="150" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="278" y1="162" x2="278" y2="150" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="292" y1="162" x2="292" y2="150" stroke="#FFB000" stroke-width="1.5"/>
    <!-- CPU pins bottom -->
    <line x1="222" y1="262" x2="222" y2="274" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="236" y1="262" x2="236" y2="274" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="250" y1="262" x2="250" y2="274" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="264" y1="262" x2="264" y2="274" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="278" y1="262" x2="278" y2="274" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="292" y1="262" x2="292" y2="274" stroke="#FFB000" stroke-width="1.5"/>

    <!-- Capacitors (circles) left side -->
    <circle cx="152" cy="158" r="14" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="144" y1="158" x2="160" y2="158" stroke="#CC8800" stroke-width="1" opacity="0.6"/>
    <line x1="152" y1="150" x2="152" y2="166" stroke="#CC8800" stroke-width="0.8" opacity="0.4"/>
    <circle cx="152" cy="192" r="14" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="144" y1="192" x2="160" y2="192" stroke="#CC8800" stroke-width="1" opacity="0.6"/>

    <!-- Small caps -->
    <circle cx="155" cy="226" r="8" fill="none" stroke="#CC8800" stroke-width="1" opacity="0.6"/>
    <circle cx="155" cy="246" r="8" fill="none" stroke="#CC8800" stroke-width="1" opacity="0.6"/>

    <!-- Resistors right side -->
    <rect x="342" y="152" width="26" height="13" rx="2" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <rect x="342" y="172" width="26" height="13" rx="2" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <rect x="342" y="192" width="26" height="13" rx="2" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <rect x="342" y="212" width="26" height="13" rx="2" fill="none" stroke="#CC8800" stroke-width="1" opacity="0.6"/>
    <rect x="342" y="232" width="26" height="13" rx="2" fill="none" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
    <!-- Resistor stripe marks -->
    <line x1="352" y1="152" x2="352" y2="165" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
    <line x1="358" y1="152" x2="358" y2="165" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
    <line x1="352" y1="172" x2="352" y2="185" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
    <line x1="360" y1="172" x2="360" y2="185" stroke="#CC8800" stroke-width="1" opacity="0.5"/>

    <!-- Memory IC chip bottom-left -->
    <rect x="130" y="290" width="60" height="44" rx="2" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="144" y1="290" x2="144" y2="282" stroke="#CC8800" stroke-width="1"/>
    <line x1="156" y1="290" x2="156" y2="282" stroke="#CC8800" stroke-width="1"/>
    <line x1="168" y1="290" x2="168" y2="282" stroke="#CC8800" stroke-width="1"/>
    <line x1="144" y1="334" x2="144" y2="342" stroke="#CC8800" stroke-width="1"/>
    <line x1="156" y1="334" x2="156" y2="342" stroke="#CC8800" stroke-width="1"/>
    <line x1="168" y1="334" x2="168" y2="342" stroke="#CC8800" stroke-width="1"/>
    <text x="160" y="316" fill="#CC8800" font-family="monospace" font-size="8" text-anchor="middle" opacity="0.7">MEM</text>
    <text x="160" y="326" fill="#CC8800" font-family="monospace" font-size="7" text-anchor="middle" opacity="0.5">16GB</text>

    <!-- IO IC chip bottom-center -->
    <rect x="218" y="290" width="76" height="44" rx="2" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <text x="256" y="316" fill="#CC8800" font-family="monospace" font-size="8" text-anchor="middle" opacity="0.7">COMMS</text>
    <text x="256" y="326" fill="#CC8800" font-family="monospace" font-size="7" text-anchor="middle" opacity="0.5">I/O BUS</text>
    <line x1="228" y1="290" x2="228" y2="282" stroke="#CC8800" stroke-width="1"/>
    <line x1="242" y1="290" x2="242" y2="282" stroke="#CC8800" stroke-width="1"/>
    <line x1="256" y1="290" x2="256" y2="282" stroke="#CC8800" stroke-width="1"/>
    <line x1="270" y1="290" x2="270" y2="282" stroke="#CC8800" stroke-width="1"/>
    <line x1="284" y1="290" x2="284" y2="282" stroke="#CC8800" stroke-width="1"/>

    <!-- Power regulator bottom-right -->
    <rect x="322" y="290" width="60" height="44" rx="2" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <text x="352" y="316" fill="#CC8800" font-family="monospace" font-size="8" text-anchor="middle" opacity="0.7">PWR</text>
    <text x="352" y="326" fill="#CC8800" font-family="monospace" font-size="7" text-anchor="middle" opacity="0.5">5V REG</text>

    <!-- Circuit traces -->
    <!-- Left traces from CPU left pins -->
    <polyline points="196,200 178,200 178,268 130,268 130,290" fill="none" stroke="#CC8800" stroke-width="1.5" opacity="0.7"/>
    <polyline points="196,212 172,212 172,275 218,275 218,290" fill="none" stroke="#CC8800" stroke-width="1.5" opacity="0.6"/>
    <!-- Right traces from CPU right pins -->
    <polyline points="320,200 336,200 336,268 382,268 382,290" fill="none" stroke="#CC8800" stroke-width="1.5" opacity="0.7"/>
    <polyline points="320,188 334,188 334,265 322,265 322,290" fill="none" stroke="#CC8800" stroke-width="1.5" opacity="0.6"/>
    <!-- Bottom CPU pins traces -->
    <polyline points="250,274 250,280 256,280 256,290" fill="none" stroke="#CC8800" stroke-width="1.5" opacity="0.6"/>
    <!-- Top CPU pins traces going up to resistors -->
    <polyline points="278,150 278,138 335,138 335,152 342,152" fill="none" stroke="#CC8800" stroke-width="1.5" opacity="0.6"/>
    <polyline points="292,150 292,132 340,132 340,172 342,172" fill="none" stroke="#CC8800" stroke-width="1.5" opacity="0.55"/>
    <!-- Left top traces to capacitors -->
    <polyline points="196,188 180,188 180,158 166,158" fill="none" stroke="#CC8800" stroke-width="1.5" opacity="0.6"/>
    <polyline points="196,200 182,200 182,192 166,192" fill="none" stroke="#CC8800" stroke-width="1.5" opacity="0.55"/>

    <!-- Via dots -->
    <circle cx="178" cy="268" r="3" fill="#FFB000" opacity="0.8"/>
    <circle cx="336" cy="268" r="3" fill="#FFB000" opacity="0.8"/>
    <circle cx="256" cy="280" r="3" fill="#FFB000" opacity="0.7"/>
    <circle cx="180" cy="158" r="2.5" fill="#FFB000" opacity="0.6"/>
    <circle cx="182" cy="192" r="2.5" fill="#FFB000" opacity="0.6"/>
    <circle cx="335" cy="138" r="2.5" fill="#FFB000" opacity="0.6"/>

    <!-- Edge connectors bottom of PCB -->
    <line x1="155" y1="368" x2="155" y2="386" stroke="#FFB000" stroke-width="3"/>
    <line x1="170" y1="368" x2="170" y2="386" stroke="#FFB000" stroke-width="3"/>
    <line x1="185" y1="368" x2="185" y2="386" stroke="#FFB000" stroke-width="3"/>
    <line x1="200" y1="368" x2="200" y2="386" stroke="#FFB000" stroke-width="3"/>
    <line x1="215" y1="368" x2="215" y2="386" stroke="#FFB000" stroke-width="3"/>
    <line x1="232" y1="368" x2="232" y2="386" stroke="#FFB000" stroke-width="3"/>
    <line x1="248" y1="368" x2="248" y2="386" stroke="#FFB000" stroke-width="3"/>
    <line x1="264" y1="368" x2="264" y2="386" stroke="#FFB000" stroke-width="3"/>
    <line x1="280" y1="368" x2="280" y2="386" stroke="#FFB000" stroke-width="3"/>
    <line x1="296" y1="368" x2="296" y2="386" stroke="#FFB000" stroke-width="3"/>
    <line x1="312" y1="368" x2="312" y2="386" stroke="#FFB000" stroke-width="3"/>
    <line x1="328" y1="368" x2="328" y2="386" stroke="#FFB000" stroke-width="3"/>

    <!-- Indicator LED top right of board -->
    <circle cx="370" cy="130" r="7" fill="#FFB000" opacity="0.5" filter="url(#glow_soft_cb)"/>
    <circle cx="370" cy="130" r="3" fill="#FFD050"/>
  </g>

  <!-- CPU glow -->
  <rect x="208" y="162" width="100" height="100" rx="3"
    fill="none" stroke="#FFD050" stroke-width="0.8" opacity="0.3" filter="url(#glow_strong_cb)"/>

  <!-- Annotations -->
  <text x="256" y="30" fill="#CC8800" font-family="monospace" font-size="12" opacity="0.7" text-anchor="middle">[ HARDWARE :: CIRCUIT BOARD ]</text>
  <text x="256" y="45" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7" text-anchor="middle">INTEGRATED PROCESSING UNIT -- REV.4</text>
  <text x="256" y="93" fill="#CC8800" font-family="monospace" font-size="9" opacity="0.5" text-anchor="middle">PRIMARY DATA BUS</text>
  <text x="256" y="404" fill="#CC8800" font-family="monospace" font-size="9" opacity="0.6" text-anchor="middle">EDGE CONNECTOR -- 12-PIN</text>
  <text x="256" y="490" fill="#CC8800" font-family="monospace" font-size="9" opacity="0.7" text-anchor="middle">SYS:CARGO  REF:PCB-4X  CLASS:COMPUTING</text>

  <!-- Scan lines overlay -->
  <rect width="512" height="512" fill="url(#scanlines_cb)" opacity="0.4"/>
  <!-- Vignette -->
  <rect width="512" height="512" fill="url(#vignette_cb)"/>
</svg>
