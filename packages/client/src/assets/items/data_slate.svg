<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="glow_soft_ds" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow_strong_ds" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="coloredBlur"/><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines_ds" x="0" y="0" width="512" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="512" height="2" fill="rgba(0,0,0,0.25)"/>
      <rect x="0" y="2" width="512" height="2" fill="rgba(0,0,0,0.05)"/>
    </pattern>
    <radialGradient id="vignette_ds" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.7)"/>
    </radialGradient>
    <radialGradient id="amberGrad_ds" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFB000" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFB000" stop-opacity="0.02"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#050505"/>
  <rect width="512" height="512" fill="url(#amberGrad_ds)"/>

  <!-- Corner brackets -->
  <g fill="none" stroke="#CC8800" stroke-width="1" opacity="0.6">
    <polyline points="16,36 16,16 36,16"/>
    <polyline points="476,16 496,16 496,36"/>
    <polyline points="16,476 16,496 36,496"/>
    <polyline points="476,496 496,496 496,476"/>
  </g>

  <!-- Main content -->
  <g filter="url(#glow_soft_ds)">
    <!-- Slate body -->
    <rect x="155" y="88" width="202" height="302" rx="14" fill="none" stroke="#FFB000" stroke-width="2.5"/>

    <!-- Screen area -->
    <rect x="170" y="108" width="172" height="188" rx="6" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <!-- Screen subtle fill -->
    <rect x="170" y="108" width="172" height="188" rx="6" fill="#FFB000" opacity="0.04"/>

    <!-- Screen content: header bar -->
    <rect x="172" y="110" width="168" height="18" rx="3" fill="#FFB000" opacity="0.1"/>
    <line x1="182" y1="123" x2="295" y2="123" stroke="#FFB000" stroke-width="1.5" opacity="0.8"/>

    <!-- Data rows -->
    <line x1="182" y1="140" x2="330" y2="140" stroke="#CC8800" stroke-width="1" opacity="0.6"/>
    <line x1="182" y1="152" x2="312" y2="152" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
    <line x1="182" y1="164" x2="322" y2="164" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
    <line x1="182" y1="176" x2="298" y2="176" stroke="#CC8800" stroke-width="1" opacity="0.45"/>

    <!-- Waveform display -->
    <polyline points="182,200 196,188 208,210 220,182 232,208 244,192 256,200 268,186 280,204 292,191 304,200 330,200"
      fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <line x1="182" y1="200" x2="330" y2="200" stroke="#CC8800" stroke-width="0.5" opacity="0.3"/>

    <!-- Grid/map panel -->
    <line x1="182" y1="222" x2="330" y2="222" stroke="#CC8800" stroke-width="0.5" opacity="0.4"/>
    <line x1="182" y1="237" x2="330" y2="237" stroke="#CC8800" stroke-width="0.5" opacity="0.4"/>
    <line x1="182" y1="252" x2="330" y2="252" stroke="#CC8800" stroke-width="0.5" opacity="0.4"/>
    <line x1="182" y1="267" x2="330" y2="267" stroke="#CC8800" stroke-width="0.5" opacity="0.4"/>
    <line x1="182" y1="282" x2="330" y2="282" stroke="#CC8800" stroke-width="0.5" opacity="0.4"/>
    <line x1="216" y1="222" x2="216" y2="290" stroke="#CC8800" stroke-width="0.5" opacity="0.4"/>
    <line x1="253" y1="222" x2="253" y2="290" stroke="#CC8800" stroke-width="0.5" opacity="0.4"/>
    <line x1="290" y1="222" x2="290" y2="290" stroke="#CC8800" stroke-width="0.5" opacity="0.4"/>

    <!-- Map blips -->
    <rect x="225" y="230" width="5" height="5" fill="#FFB000" opacity="0.8"/>
    <rect x="262" y="260" width="5" height="5" fill="#FFB000" opacity="0.8"/>
    <rect x="194" y="245" width="5" height="5" fill="#FFB000" opacity="0.5"/>
    <rect x="300" y="238" width="5" height="5" fill="#FFB000" opacity="0.4"/>

    <!-- Map blip connection lines -->
    <line x1="228" y1="233" x2="265" y2="263" stroke="#CC8800" stroke-width="0.8" opacity="0.4" stroke-dasharray="2,3"/>

    <!-- Bottom control panel -->
    <rect x="170" y="310" width="172" height="64" rx="4" fill="none" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
    <!-- Divider -->
    <line x1="170" y1="326" x2="342" y2="326" stroke="#CC8800" stroke-width="0.5" opacity="0.3"/>

    <!-- Port circle -->
    <circle cx="204" cy="342" r="10" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <circle cx="204" cy="342" r="5" fill="#FFB000" opacity="0.25"/>
    <circle cx="204" cy="342" r="2" fill="#FFB000" opacity="0.6"/>

    <!-- Buttons -->
    <rect x="228" y="330" width="24" height="10" rx="3" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <rect x="228" y="346" width="24" height="10" rx="3" fill="none" stroke="#CC8800" stroke-width="1"/>
    <rect x="258" y="330" width="24" height="10" rx="3" fill="none" stroke="#CC8800" stroke-width="1"/>
    <rect x="258" y="346" width="24" height="10" rx="3" fill="none" stroke="#CC8800" stroke-width="1" opacity="0.5"/>

    <!-- Status LED -->
    <circle cx="320" cy="342" r="8" fill="#FFB000" opacity="0.55" filter="url(#glow_soft_ds)"/>
    <circle cx="320" cy="342" r="4" fill="#FFD050"/>

    <!-- Home button bottom center -->
    <circle cx="256" cy="376" r="12" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <rect x="250" y="370" width="12" height="12" rx="2" fill="none" stroke="#CC8800" stroke-width="1" opacity="0.6"/>

    <!-- Side circuit traces -->
    <line x1="155" y1="165" x2="170" y2="165" stroke="#CC8800" stroke-width="1" opacity="0.4"/>
    <line x1="155" y1="200" x2="170" y2="200" stroke="#CC8800" stroke-width="1" opacity="0.4"/>
    <line x1="155" y1="235" x2="170" y2="235" stroke="#CC8800" stroke-width="1" opacity="0.4"/>
    <line x1="155" y1="145" x2="165" y2="145" stroke="#CC8800" stroke-width="0.8" opacity="0.3"/>

    <!-- Camera notch at top -->
    <rect x="244" y="93" width="24" height="8" rx="4" fill="none" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
    <circle cx="256" cy="97" r="3" fill="none" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Screen glow -->
  <rect x="170" y="108" width="172" height="188" rx="6"
    fill="none" stroke="#FFD050" stroke-width="0.5" opacity="0.3" filter="url(#glow_strong_ds)"/>

  <!-- Annotations -->
  <text x="256" y="30" fill="#CC8800" font-family="monospace" font-size="12" opacity="0.7" text-anchor="middle">[ STORAGE :: DATA SLATE ]</text>
  <text x="256" y="45" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7" text-anchor="middle">PORTABLE DATA STORAGE DEVICE</text>
  <text x="370" y="155" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7">CAP</text>
  <text x="370" y="168" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7">8.4TB</text>
  <text x="370" y="200" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7">ENC</text>
  <text x="370" y="213" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7">AES-512</text>
  <text x="370" y="245" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7">CHG</text>
  <text x="370" y="258" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7">94%</text>
  <text x="256" y="415" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.6" text-anchor="middle">VOID SECTOR DATA SYSTEMS</text>
  <text x="256" y="490" fill="#CC8800" font-family="monospace" font-size="9" opacity="0.7" text-anchor="middle">SYS:CARGO  REF:DATA-SLT  ENCRYPTED</text>

  <!-- Scan lines overlay -->
  <rect width="512" height="512" fill="url(#scanlines_ds)" opacity="0.4"/>
  <!-- Vignette -->
  <rect width="512" height="512" fill="url(#vignette_ds)"/>
</svg>
