<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="glow_soft_artefact" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow_strong_artefact" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="coloredBlur"/><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines_artefact" x="0" y="0" width="512" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="512" height="2" fill="rgba(0,0,0,0.25)"/>
      <rect x="0" y="2" width="512" height="2" fill="rgba(0,0,0,0.05)"/>
    </pattern>
    <radialGradient id="vignette_artefact" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.7)"/>
    </radialGradient>
    <radialGradient id="amberGrad_artefact" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFB000" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFB000" stop-opacity="0.02"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#050505"/>
  <rect width="512" height="512" fill="url(#amberGrad_artefact)"/>

  <!-- Corner brackets -->
  <g fill="none" stroke="#CC8800" stroke-width="1" opacity="0.6">
    <polyline points="16,36 16,16 36,16"/>
    <polyline points="476,16 496,16 496,36"/>
    <polyline points="16,476 16,496 36,496"/>
    <polyline points="476,496 496,496 496,476"/>
  </g>

  <!-- Main content -->
  <g filter="url(#glow_soft_artefact)">
    <!-- Outer ring dashed -->
    <circle cx="256" cy="215" r="120" fill="none" stroke="#CC8800" stroke-width="1.5" opacity="0.6" stroke-dasharray="8,4"/>
    <!-- Middle ring -->
    <circle cx="256" cy="215" r="88" fill="none" stroke="#FFB000" stroke-width="2"/>
    <!-- Inner ring -->
    <circle cx="256" cy="215" r="56" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <!-- Core ring -->
    <circle cx="256" cy="215" r="22" fill="none" stroke="#FFD050" stroke-width="2"/>
    <!-- Core glow -->
    <circle cx="256" cy="215" r="8" fill="#FFB000" opacity="0.8" filter="url(#glow_strong_artefact)"/>
    <circle cx="256" cy="215" r="5" fill="#FFD050" opacity="0.9"/>

    <!-- Geometric arms (cardinal directions) -->
    <line x1="256" y1="127" x2="256" y2="159" stroke="#FFB000" stroke-width="2"/>
    <line x1="256" y1="271" x2="256" y2="303" stroke="#FFB000" stroke-width="2"/>
    <line x1="168" y1="215" x2="200" y2="215" stroke="#FFB000" stroke-width="2"/>
    <line x1="312" y1="215" x2="344" y2="215" stroke="#FFB000" stroke-width="2"/>

    <!-- Diagonal arms -->
    <line x1="194" y1="153" x2="216" y2="177" stroke="#FFB000" stroke-width="2"/>
    <line x1="318" y1="153" x2="296" y2="177" stroke="#FFB000" stroke-width="2"/>
    <line x1="194" y1="277" x2="216" y2="253" stroke="#FFB000" stroke-width="2"/>
    <line x1="318" y1="277" x2="296" y2="253" stroke="#FFB000" stroke-width="2"/>

    <!-- Outer arm caps -->
    <rect x="248" y="117" width="16" height="10" rx="2" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <rect x="248" y="303" width="16" height="10" rx="2" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <rect x="158" y="208" width="10" height="14" rx="2" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <rect x="344" y="208" width="10" height="14" rx="2" fill="none" stroke="#FFB000" stroke-width="1.5"/>

    <!-- Corner diamonds -->
    <polygon points="194,143 202,153 194,163 186,153" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <polygon points="318,143 326,153 318,163 310,153" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <polygon points="194,267 202,277 194,287 186,277" fill="none" stroke="#FFB000" stroke-width="1.5"/>
    <polygon points="318,267 326,277 318,287 310,277" fill="none" stroke="#FFB000" stroke-width="1.5"/>

    <!-- Alien glyphs around inner ring -->
    <!-- Glyph top: cross-circle -->
    <g transform="translate(256,161)">
      <line x1="-7" y1="0" x2="7" y2="0" stroke="#FFD050" stroke-width="1.5"/>
      <line x1="0" y1="-7" x2="0" y2="7" stroke="#FFD050" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="4" fill="none" stroke="#FFD050" stroke-width="1"/>
    </g>
    <!-- Glyph right: triangle -->
    <g transform="translate(312,215)">
      <polygon points="0,-7 7,4 -7,4" fill="none" stroke="#FFD050" stroke-width="1.5"/>
    </g>
    <!-- Glyph bottom: square-cross -->
    <g transform="translate(256,269)">
      <rect x="-6" y="-6" width="12" height="12" fill="none" stroke="#FFD050" stroke-width="1.5"/>
      <line x1="-6" y1="-6" x2="6" y2="6" stroke="#FFD050" stroke-width="1"/>
      <line x1="6" y1="-6" x2="-6" y2="6" stroke="#FFD050" stroke-width="1"/>
    </g>
    <!-- Glyph left: three lines -->
    <g transform="translate(200,215)">
      <line x1="-6" y1="-6" x2="6" y2="-6" stroke="#FFD050" stroke-width="1.5"/>
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#FFD050" stroke-width="1.5"/>
      <line x1="-6" y1="6" x2="6" y2="6" stroke="#FFD050" stroke-width="1.5"/>
    </g>
    <!-- Glyph diagonal top-right -->
    <g transform="translate(296,177)">
      <polygon points="-5,-5 5,-5 5,5" fill="none" stroke="#FFD050" stroke-width="1"/>
    </g>
    <!-- Glyph diagonal bottom-left -->
    <g transform="translate(216,253)">
      <polygon points="5,5 -5,5 -5,-5" fill="none" stroke="#FFD050" stroke-width="1"/>
    </g>

    <!-- Emission arcs (unknown signal) -->
    <path d="M256,95 A120,120 0 0,1 376,215" fill="none" stroke="#CC8800" stroke-width="1" opacity="0.3" stroke-dasharray="3,6"/>
    <path d="M256,335 A120,120 0 0,1 136,215" fill="none" stroke="#CC8800" stroke-width="1" opacity="0.3" stroke-dasharray="3,6"/>
    <path d="M256,95 A120,120 0 0,0 136,215" fill="none" stroke="#CC8800" stroke-width="0.8" opacity="0.2" stroke-dasharray="2,8"/>

    <!-- Rotating indicator marks on outer ring -->
    <line x1="256" y1="95" x2="259" y2="103" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
    <line x1="346" y1="155" x2="340" y2="161" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
    <line x1="376" y1="215" x2="368" y2="215" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
    <line x1="346" y1="275" x2="340" y2="269" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
    <line x1="256" y1="335" x2="253" y2="327" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
    <line x1="166" y1="275" x2="172" y2="269" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
    <line x1="136" y1="215" x2="144" y2="215" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
    <line x1="166" y1="155" x2="172" y2="161" stroke="#CC8800" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Inner ring glow -->
  <circle cx="256" cy="215" r="22" fill="none" stroke="#FFD050" stroke-width="1.5"
    opacity="0.5" filter="url(#glow_strong_artefact)"/>

  <!-- Annotations -->
  <text x="256" y="30" fill="#CC8800" font-family="monospace" font-size="12" opacity="0.7" text-anchor="middle">[ ARTIFACT SCAN :: UNKNOWN-0X ]</text>
  <text x="256" y="45" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7" text-anchor="middle">ALIEN ORIGIN -- CLASSIFICATION: ANCIENT</text>
  <text x="390" y="195" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7">AGE</text>
  <text x="390" y="208" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7">&gt;12kY</text>
  <text x="390" y="240" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7">EMIT</text>
  <text x="390" y="253" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7">DETECTED</text>
  <text x="256" y="415" fill="#CC8800" font-family="monospace" font-size="10" opacity="0.7" text-anchor="middle">! ORIGIN UNKNOWN -- HANDLE WITH CAUTION !</text>
  <text x="256" y="490" fill="#CC8800" font-family="monospace" font-size="9" opacity="0.7" text-anchor="middle">SYS:CARGO  REF:ARTF-0X  CLASS:ANOMALOUS</text>

  <!-- Scan lines overlay -->
  <rect width="512" height="512" fill="url(#scanlines_artefact)" opacity="0.4"/>
  <!-- Vignette -->
  <rect width="512" height="512" fill="url(#vignette_artefact)"/>
</svg>
