services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voidsector
      POSTGRES_PASSWORD: voidsector_dev
      POSTGRES_DB: voidsector
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
